apiVersion: v1   
kind: PersistentVolume
metadata:
  name: efs-static #name our wish
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName:   #this should be empty in static provisioning
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: <create chesinadhi thisukovali>
------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-static
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: #not required
  resources:
    requests:
      storage: 5Gi
----------------------
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels: 
    purpose: efs-static-demo
    project: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: efs-static
---------
apiVersion: v1
kind: Service
metadata:
  name: efs-static
  labels: 
    purpose: efs-static-demo
    project: roboshop
spec:
  selector:
   purpose: efs-static-demo
   project: roboshop
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port